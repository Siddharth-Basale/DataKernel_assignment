# CI: verify Docker image builds and frontend compiles on every push / PR.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-backend:
    name: Build API Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: support-insight-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  frontend-build:
    name: Build React frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Production build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://placeholder.onrender.com

  python-syntax:
    name: Python syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile agent modules
        run: |
          python -m compileall -q main.py agent1_graph.py agent2_graph.py agent3_graph.py agent4_graph.py agent5_graph.py
