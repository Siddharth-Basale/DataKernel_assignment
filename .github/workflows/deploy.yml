# CD: trigger Render redeploy after CI succeeds on main.
# Secret: RENDER_DEPLOY_HOOK_URL (Render → your Web Service → Settings → Deploy Hook).
name: CD — Deploy to Render

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-render:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    if: >
      ${{
        github.event.workflow_run.conclusion == 'success' ||
        github.event_name == 'workflow_dispatch'
      }}
    steps:
      - name: Deploy via Render hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::Add RENDER_DEPLOY_HOOK_URL in GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."
